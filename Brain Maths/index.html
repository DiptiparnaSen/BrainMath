<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Math</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <p class="eyebrow">Brain Math</p>
        <h1>Brain Math</h1>
        <p class="intro">
          Messy input? Rejected.<br />
          Half-hearted typing? Denied.<br />
          Only the worthy digits get in.
        </p>

        <section class="display-stack" aria-live="polite">
          <div class="display-top">
            <div class="display-card calculation-display">
              <span class="display-label">Calculation</span>
              <strong id="calculationValue">0 + 0 = 0</strong>
            </div>
            <div class="display-card entered-display">
              <span class="display-label">Entered Number</span>
              <strong id="enteredValue">0</strong>
              <img
                id="angryInputImage"
                class="status-image angry-input-image"
                src="./angry.png"
                alt="Angry"
                hidden
              />
            </div>
          </div>

          <div class="display-card result-display">
            <span class="display-label">Result</span>
            <strong id="resultValue">0</strong>
            <img
              id="ownerResultImage"
              class="status-image owner-result-image"
              src="./Owner.jpeg"
              alt="Owner"
              hidden
            />
          </div>
        </section>

        <label class="field-label" for="numberInput">Enter value</label>
        <input
          id="numberInput"
          class="number-input"
          type="text"
          inputmode="numeric"
          maxlength="4"
          placeholder="0 to 9999"
          aria-describedby="message"
        />

        <p id="message" class="message" aria-live="polite"></p>

        <div class="button-grid" aria-label="Number buttons">
          <button type="button" class="digit-button" data-value="0">0</button>
          <button type="button" class="digit-button" data-value="1">1</button>
          <button type="button" class="digit-button" data-value="2">2</button>
          <button type="button" class="digit-button" data-value="3">3</button>
          <button type="button" class="digit-button" data-value="4">4</button>
          <button type="button" class="digit-button" data-value="5">5</button>
          <button type="button" class="digit-button" data-value="6">6</button>
          <button type="button" class="digit-button" data-value="7">7</button>
          <button type="button" class="digit-button" data-value="8">8</button>
          <button type="button" class="digit-button" data-value="9">9</button>
        </div>

        <div class="utility-actions">
          <button type="button" class="utility-button" id="backspaceButton">
            Backspace
          </button>
          <button type="button" class="secondary-button" id="clearButton">
            Clear
          </button>
        </div>

        <div class="actions">
          <button type="button" class="primary-button" id="resultButton">
            Result
          </button>
        </div>

        <p class="hint">Maximum supported value: 9999</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
